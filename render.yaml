services:
  - type: web
    name: cloudshelf-api
    runtime: python
    rootDir: backend
    buildCommand: curl -LsSf https://astral.sh/uv/install.sh | sh && uv sync
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    # 免费套餐：512 MB RAM, 750 小时/月, 15 分钟不活跃后休眠
    plan: free
    # 持久化磁盘 — 存储 SQLite 数据库（最低 $0.25/GB/月）
    # 取消下面注释以启用：
    # disk:
    #   name: data
    #   mountPath: /opt/render/project/src/backend/data
    #   sizeGB: 1
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # 敏感信息请在 Render Dashboard 中手动设置：
      # LLM_API_KEY, GITHUB_TOKEN, CORS_ORIGINS
