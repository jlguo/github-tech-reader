<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ repo.name }} — 技术演进分析报告索引</title>
<style>
:root {
  --bg: #f9fafb;
  --card: #ffffff;
  --primary: #2563eb;
  --text: #111827;
  --text-secondary: #4b5563;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 48px 32px;
}
h1 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 8px;
}
.meta {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 32px;
}
.page-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.page-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.15s;
}
.page-link:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
}
.page-link .page-num {
  font-weight: 600;
  color: var(--primary);
  font-size: 14px;
}
.page-link .page-range {
  font-size: 14px;
  color: var(--text-secondary);
}
.page-link .page-versions {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
</style>
</head>
<body>
<div class="container">
  <h1>{{ repo.name }}</h1>
  <p class="meta">技术演进分析报告 · {{ analysis_time }} · {{ pages|length }} 页</p>
  <div class="page-list">
    {% for page in pages %}
    <a class="page-link" href="{{ page.filename }}">
      <span class="page-num">第 {{ loop.index }} 页</span>
      <span class="page-range">{{ page.label }}</span>
      <span class="page-versions">{{ page.first }} → {{ page.last }}</span>
    </a>
    {% endfor %}
  </div>
</div>
</body>
</html>
