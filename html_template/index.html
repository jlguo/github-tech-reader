<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ repo.name }} — 技术演进分析项目索引</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #f8f5f2;
  color: #1f2937;
  line-height: 1.7;
  min-height: 100vh;
}
.header {
  height: 72px;
  background: #ffffff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  padding: 0 40px;
  gap: 16px;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: #8b7355;
  border-radius: 8px;
  flex-shrink: 0;
}
.title-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
h1 {
  font-size: 18px;
  font-weight: 600;
  color: #1f2937;
}
.meta {
  font-size: 12px;
  color: #6b7280;
}
.spacer { flex: 1; }
.back-link {
  color: #8b7355;
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}
.book-shell {
  max-width: 960px;
  margin: 64px auto;
  padding: 0 32px;
}
.index-card {
  background: #ffffff;
  border-radius: 14px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.08);
  padding: 40px;
}
.index-title {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}
.index-subtitle {
  font-size: 14px;
  color: #6b7280;
  margin-bottom: 32px;
}
.page-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.page-link {
  display: grid;
  grid-template-columns: 92px 1fr auto;
  align-items: center;
  gap: 20px;
  padding: 16px 18px;
  background: #faf7f4;
  border-radius: 10px;
  text-decoration: none;
  color: #1f2937;
  transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
}
.page-link:hover {
  background: #f5ebe3;
  transform: translateX(4px);
  box-shadow: 0 4px 14px rgba(139,115,85,0.18);
}
.page-num {
  font-weight: 600;
  color: #8b7355;
  font-size: 14px;
}
.page-range {
  font-size: 14px;
  color: #4b5563;
}
.page-versions {
  font-size: 12px;
  color: #9ca3af;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
</style>
</head>
<body>
<header class="header">
  <div class="logo-icon"></div>
  <div class="title-group">
    <h1>{{ repo.name }}</h1>
    <p class="meta">技术演进分析项目 · {{ analysis_time }} · {{ pages|length }} 页</p>
  </div>
  <div class="spacer"></div>
  <a class="back-link" href="../library.html">← 返回项目库</a>
</header>

<main class="book-shell">
  <section class="index-card">
    <div class="index-title">目录</div>
    <div class="index-subtitle">选择一个版本范围开始阅读</div>
    <div class="page-list">
      {% for page in pages %}
      <a class="page-link" href="{{ page.filename }}">
        <span class="page-num">第 {{ loop.index }} 页</span>
        <span class="page-range">{{ page.label }}</span>
        <span class="page-versions">{{ page.first }} → {{ page.last }}</span>
      </a>
      {% endfor %}
    </div>
  </section>
</main>
</body>
</html>
