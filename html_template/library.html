<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Tech Reader — 报告库</title>
<style>
:root {
  --bg: #f9fafb;
  --card: #ffffff;
  --primary: #2563eb;
  --text: #111827;
  --text-secondary: #4b5563;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
}
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 48px 32px;
}
h1 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 4px;
}
.subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 32px;
}
.report-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.report-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px 24px;
  text-decoration: none;
  color: inherit;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.report-card:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
}
.report-info {
  min-width: 0;
}
.report-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.report-meta {
  font-size: 13px;
  color: var(--text-muted);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.report-meta span {
  white-space: nowrap;
}
.report-arrow {
  color: var(--text-muted);
  font-size: 18px;
  flex-shrink: 0;
}
.empty {
  text-align: center;
  padding: 64px 0;
  color: var(--text-muted);
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
  <h1>GitHub Tech Reader — 报告库</h1>
  <p class="subtitle">所有已生成的技术演进分析报告</p>
  <div class="report-list">
    {% if reports %}
    {% for r in reports %}
    <a class="report-card" href="{{ r.path }}/index.html">
      <div class="report-info">
        <div class="report-name">{{ r.repo }}</div>
        <div class="report-meta">
          <span>{{ r.iterations }} 个版本</span>
          <span>{{ r.pages }} 页</span>
          <span>{{ r.generated }}</span>
        </div>
      </div>
      <span class="report-arrow">→</span>
    </a>
    {% endfor %}
    {% else %}
    <div class="empty">暂无报告。运行 <code>python main.py &lt;repo_url&gt;</code> 生成第一份报告。</div>
    {% endif %}
  </div>
</div>
</body>
</html>
