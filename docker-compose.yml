# ────────────────────────────────────────────────
# Local Docker Deployment — Multi-Service
# ────────────────────────────────────────────────
# Usage:
#   docker compose up -d              # production-like (nginx + uvicorn)
#   docker compose -f docker-compose.dev.yml up   # dev mode with hot reload
#
# Architecture:
#   frontend (nginx:80) ──proxy──▶ backend (uvicorn:8000)
#       ↑                                ↑
#   http://localhost                 http://localhost:8000 (API docs)

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped

volumes:
  backend_data:
